packages:
  "framer-motion": "For smooth page transitions, accordion animations, and interactive quiz elements"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility to safely merge Tailwind CSS classes without style conflicts"

images:
  - path: "artifacts/pravoznavstvo/public/images/hero-bg.png"
    description: "Abstract geometric background in deep azure blue and soft teal colors, representing order, structure, and education. Subtle glowing lines resembling a modern digital grid or stylized pillars of justice, very clean and professional, suitable for a school website header."
    aspect_ratio: "16:9"
  - path: "artifacts/pravoznavstvo/public/images/about-illustration.png"
    description: "Modern, flat-style vector illustration of a diverse group of students reading books and discussing, with floating abstract legal icons like scales and gavels in the background. Soft teal and slate blue color palette, clean white background."
    aspect_ratio: "4:3"

notes:
  - This is a purely frontend application.
  - All data is hardcoded in the client.
  - Wouter is used for routing.
